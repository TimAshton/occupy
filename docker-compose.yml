name: occupy

services:
  server:
    image: ${ECR_REGISTRY}/occupy-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      CLIENT_ORIGIN: "https://occupy.tashton.com"
      DB_PATH: /data/occupy.db
    volumes:
      - sqlite_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  client:
    image: ${ECR_REGISTRY}/occupy-client:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      server:
        condition: service_healthy

volumes:
  sqlite_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/occupy/data
  caddy_data:
  caddy_config:
