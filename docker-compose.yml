name: occupy

# Images are set via environment variables injected by the deploy workflow.
# On the EC2 host, create /opt/occupy/.env with:
#   ECR_REGISTRY=<account>.dkr.ecr.<region>.amazonaws.com
#   IMAGE_TAG=latest   (or a git SHA for pinned deploys)

services:
  server:
    image: ${ECR_REGISTRY}/occupy-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      CLIENT_ORIGIN: "http://localhost"   # Nginx is on the same host
      DB_PATH: /data/occupy.db
    volumes:
      - sqlite_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  client:
    image: ${ECR_REGISTRY}/occupy-client:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  sqlite_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/occupy/data   # EBS-backed directory on EC2
